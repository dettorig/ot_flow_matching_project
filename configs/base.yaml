# Shared hyper-parameters for the baseline Flow Matching experiments.
# Every notebook / script in this repo should read its config from this file
# (or an override of it) so that runs are comparable across couplings.

data:
  source: moons        # one of: moons, gaussian
  target: 8gaussians   # one of: 8gaussians, gaussian
  n: 1000              # number of samples per distribution

model:
  widths: [3, 128, 128, 128, 2]   # input dim 3 = (x, t), output dim 2

training:
  optimizer: adam
  lr: 1.0e-3
  train_steps: 2000
  t_schedule_seed: 123

rollout:
  default_solver: euler
  default_steps: 32
  nfe_list: [4, 8, 16, 32, 64]
  pe_steps: 256

sinkhorn:
  default_eps: 0.05
  eps_list: [0.01, 0.03, 0.05, 0.1, 0.2]

perturbed_ot:
  alpha_list: [0.0, 0.25, 0.5, 0.75, 1.0]

multiseed:
  seeds: [0, 1, 2, 3, 4]
  n: 500              # smaller n for the multi-seed sweep to keep wall-time reasonable
  train_steps: 2000

metrics:
  curvature_steps: 128
  velocity_kernel:
    n_time_samples: 8
    sigma: 0.6
    n_query: 1024
    n_ref: 2048
    include_time: true
    time_scale: 1.0
  sliced_wasserstein:
    n_projections: 256
  mode_presence_threshold: 0.02
