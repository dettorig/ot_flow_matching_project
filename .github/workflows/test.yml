name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check otfm tests

      - name: Run pytest
        run: pytest -q

  notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + notebook deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notebook]"

      - name: Execute main notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute main.ipynb \
            --ExecutePreprocessor.timeout=1800 \
            --output executed_main.ipynb
